<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elytis AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <style>
      /* κουμπί αλλαγής */
      #change-btn {
        position: absolute;
        bottom: 20px;
        right: 20px;
        padding: 15px 25px;
        background: #FFD700;
        border: 2px solid #000;
        border-radius: 50px;
        font-weight: bold;
        z-index: 1000;
      }
      
      #text-overlay {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 80%;
        padding: 15px;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        text-align: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 18px;
        border-radius: 10px;
        border: 1px solid #FFD700;
        z-index: 1000;
      }
      video {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        object-fit: cover;
        z-index: -1;
      }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    
    <div id="text-overlay">Ο ΑΓΓΕΛΟΣ ΤΗΣ ΑΣΤΥΠΑΛΑΙΑΣ<br>Πουθενά δεν πάει ο καιρός...</div>
    <button id="change-btn">ΕΠΟΜΕΝΟ</button>

    <a-scene vr-mode-ui="enabled: false">
      <a-assets>
        <img id="img1" src="assets/1.png">
        <img id="img2" src="assets/2.png">
        <img id="img3" src="assets/3.png">
        <img id="img4" src="assets/4.png">
      </a-assets>

      <a-entity camera="fov: 80">
        <a-image id="main-image" src="#img1" position="0 0 -6" width="2.8" height="3.8" material="shader: flat; transparent: true;"></a-image>
      </a-entity>
    </a-scene>

    <script>
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => {
          let video = document.createElement('video');
          video.srcObject = stream;
          video.setAttribute('playsinline', '');
          video.play();
          document.body.appendChild(video);
        });

      // ΚΕΙΜΕΝΑ
      const data = [
        { src: "#img1", text: "<b>Ο ΑΓΓΕΛΟΣ ΤΗΣ ΑΣΤΥΠΑΛΑΙΑΣ (1966)</b><br>Ο Ελύτης χρησιμοποιεί τον άγγελο ως σύμβολο αγνότητας, ενσωματώνοντας βυζαντινά στοιχεία στο κολάζ." },
        { src: "#img2", text: "<b>Η ΠΡΟΣΦΟΡΑ</b><br>Ανάδειξη της ιερότητας της καθημερινότητας και του ελληνικού φωτός." },
        { src: "#img3", text: "<b>ΤΟ ΜΗΝΥΜΑ</b><br>Έντονα χρώματα που συμβολίζουν την ελπίδα και την ορμή του ονείρου." },
        { src: "#img4", text: "<b>ΕΡΗΜΙΑ</b><br>Εξερεύνηση της σιωπής και της μοναξιάς του τοπίου μέσα από την υπερρεαλιστική ματιά." }
      ];

      let currentIndex = 0;
      const btn = document.getElementById('change-btn');
      const imageEl = document.getElementById('main-image');
      const textOverlay = document.getElementById('text-overlay');

      btn.addEventListener('click', () => {
        currentIndex = (currentIndex + 1) % data.length;
        imageEl.setAttribute('src', data[currentIndex].src);
        
        // Αλλαγή του κειμένου
        textOverlay.innerHTML = data[currentIndex].text;
        
        if(currentIndex === 3) { 
            imageEl.setAttribute('width', '3.2');
            imageEl.setAttribute('height', '3.2');
        } else {
            imageEl.setAttribute('width', '2.8');
            imageEl.setAttribute('height', '3.8');
        }
      });
    </script>
  </body>
</html>
