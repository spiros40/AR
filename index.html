<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elytis AR - Stable Edition</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <style>
      /* Το κουμπί παραμένει σταθερό */
      #change-btn {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        padding: 15px 30px;
        background: #FFD700;
        border: 2px solid #000;
        border-radius: 50px;
        font-family: sans-serif;
        font-weight: bold;
        font-size: 18px;
        z-index: 1000;
      }
      /* Αναγκάζουμε την κάμερα να φαίνεται στο υπόβαθρο */
      video {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        object-fit: cover;
        z-index: -1;
      }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    
    <button id="change-btn">Επόμενη Εικόνα</button>

    <a-scene vr-mode-ui="enabled: false">
      
      <a-assets>
        <img id="img1" src="assets/1.png">
        <img id="img2" src="assets/2.png">
        <img id="img3" src="assets/3.png">
        <img id="img4" src="assets/4.png">
      </a-assets>

      <a-entity camera="fov: 80">
        
        <a-image id="main-image" 
                 src="#img1" 
                 position="0 0 -6" 
                 width="2.8" 
                 height="3.8"
                 material="shader: flat; transparent: true;">
        </a-image>

        <a-text id="main-text" 
                value="Ο Αγγελος της Αστυπαλαιας" 
                align="center" 
                color="#FFD700" 
                position="0 2.5 -6" 
                width="6">
        </a-text>

      </a-entity>
    </a-scene>

    <script>
      // Script για να ανοίξει η κάμερα στο υπόβαθρο χειροκίνητα (πιο σταθερό)
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => {
          let video = document.createElement('video');
          video.srcObject = stream;
          video.play();
          document.body.appendChild(video);
        })
        .catch(err => console.error("Camera error: ", err));

      const data = [
        { src: "#img1", text: "Εδώ γράφεις το κείμενο για τον Άγγελο της Αστυπαλαιας" },
        { src: "#img2", text: "Εδώ γράφεις το κείμενο για τον Άγγελο της Προσφορα" },
        { src: "#img3", text: "Εδώ γράφεις το κείμενο για τον Άγγελο της Το Μηνυμα" },
        { src: "#img4", text: "Εδώ γράφεις το κείμενο για τον Άγγελο της Ερημια" }
      ];

      let currentIndex = 0;
      const btn = document.getElementById('change-btn');
      const imageEl = document.getElementById('main-image');
      const textEl = document.getElementById('main-text');

      btn.addEventListener('click', () => {
        currentIndex = (currentIndex + 1) % data.length;
        imageEl.setAttribute('src', data[currentIndex].src);
        textEl.setAttribute('value', data[currentIndex].text);
        
        if(currentIndex === 3) { 
            imageEl.setAttribute('width', '3.2');
            imageEl.setAttribute('height', '3.2');
        } else {
            imageEl.setAttribute('width', '2.8');
            imageEl.setAttribute('height', '3.8');
        }
      });
    </script>
  </body>
</html>
