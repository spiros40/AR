<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Οδυσσέας Ελύτης - Interactive AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      /* Στυλ για το κουμπί στην οθόνη */
      #change-btn {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 200px;
        height: 50px;
        background: rgba(255, 215, 0, 0.8);
        border: none;
        border-radius: 25px;
        color: black;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        z-index: 999; /* Να είναι πάνω από την AR σκηνή */
      }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    
    <button id="change-btn">Επόμενη Εικόνα</button>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      
      <a-assets>
        <img id="img1" src="assets/1.jpg">
        <img id="img2" src="assets/2.jpg">
        <img id="img3" src="assets/3.jpg">
        <img id="img4" src="assets/4.png">
      </a-assets>

      <a-entity camera look-controls>
        
        <a-image id="main-image" src="#img1" position="0 0.1 -4" width="1.5" height="2.2"></a-image>

        <a-text id="main-text" 
                value="Ο Αγγελος της Αστυπαλαιας" 
                align="center" 
                color="#FFD700" 
                position="0 1.5 -4" 
                width="4">
        </a-text>

      </a-entity>
    </a-scene>

    <script>
      // Τα δεδομένα μας: Εικόνες και τα αντίστοιχα κείμενα
      const data = [
        { src: "#img1", text: "Ο Αγγελος της Αστυπαλαιας" },
        { src: "#img2", text: "Η Προσφορα" },
        { src: "#img3", text: "Το Μηνυμα" },
        { src: "#img4", text: "Ερημια" }
      ];

      let currentIndex = 0;
      const btn = document.getElementById('change-btn');
      const imageEl = document.getElementById('main-image');
      const textEl = document.getElementById('main-text');

      // Λειτουργία αλλαγής
      btn.addEventListener('click', () => {
        currentIndex = (currentIndex + 1) % data.length; // Πηγαίνει στην επόμενη και μετά πάλι στην πρώτη
        
        // Ενημέρωση της AR σκηνής
        imageEl.setAttribute('src', data[currentIndex].src);
        textEl.setAttribute('value', data[currentIndex].text);
        
        console.log("Αλλαγή σε: " + data[currentIndex].text);
      });
    </script>
  </body>
</html>
