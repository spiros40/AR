<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elytis AR - Marker Based</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      #text-overlay {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 85%;
        padding: 15px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        text-align: center;
        font-family: sans-serif;
        font-size: 17px;
        border-radius: 12px;
        border: 1px solid #FFD700;
        z-index: 1000;
        display: none; /* Εμφανίζεται μόνο όταν βρεθεί ο δείκτης */
      }
      #change-btn {
        position: absolute;
        bottom: 20px;
        right: 20px;
        padding: 15px 25px;
        background: #FFD700;
        border-radius: 50px;
        font-weight: bold;
        z-index: 1000;
      }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    
    <div id="text-overlay"></div>
    <button id="change-btn">ΕΠΟΜΕΝΟ ΕΡΓΟ</button>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <img id="img1" src="assets/1.png">
        <img id="img2" src="assets/2.png">
        <img id="img3" src="assets/3.png">
        <img id="img4" src="assets/4.png">
      </a-assets>

      <a-marker preset="hiro" id="marker">
        <a-image id="main-image" 
                 src="#img1" 
                 position="0 0.5 0" 
                 rotation="-90 0 0" 
                 width="2" height="3" 
                 material="shader: flat; transparent: true;">
        </a-image>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const data = [
        { src: "#img1", text: "<b>Ο ΑΓΓΕΛΟΣ ΤΗΣ ΑΣΤΥΠΑΛΑΙΑΣ (1966)</b><br>Σύμβολο αγνότητας και βυζαντινής παράδοσης." },
        { src: "#img2", text: "<b>Η ΠΡΟΣΦΟΡΑ</b><br>Η ιερότητα της καθημερινότητας και το φως του Αιγαίου." },
        { src: "#img3", text: "<b>ΤΟ ΜΗΝΥΜΑ</b><br>Έντονα χρώματα που συμβολίζουν την ελπίδα." },
        { src: "#img4", text: "<b>ΕΡΗΜΙΑ</b><br>Η σιωπή και η υπαρξιακή αναζήτηση στο τοπίο." }
      ];

      let currentIndex = 0;
      const marker = document.getElementById('marker');
      const textOverlay = document.getElementById('text-overlay');
      const imageEl = document.getElementById('main-image');
      const btn = document.getElementById('change-btn');

      // Έλεγχος αν ο δείκτης είναι ορατός για το κείμενο
      marker.addEventListener('markerFound', () => {
        textOverlay.style.display = 'block';
        textOverlay.innerHTML = data[currentIndex].text;
      });

      marker.addEventListener('markerLost', () => {
        textOverlay.style.display = 'none';
      });

      // Αλλαγή έργου με το κουμπί
      btn.addEventListener('click', () => {
        currentIndex = (currentIndex + 1) % data.length;
        imageEl.setAttribute('src', data[currentIndex].src);
        textOverlay.innerHTML = data[currentIndex].text;
      });
    </script>
  </body>
</html>
