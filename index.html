<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elytis AR - Comprehensive Edition</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      #change-btn {
        position: absolute; bottom: 20px; right: 20px;
        padding: 15px 25px; background: #FFD700;
        border: 2px solid #000; border-radius: 50px;
        font-family: sans-serif; font-weight: bold;
        z-index: 1000; display: none;
      }
      #text-overlay {
        position: absolute; top: 10px; left: 50%;
        transform: translateX(-50%); width: 85%;
        padding: 20px; background: rgba(0, 0, 0, 0.8);
        color: white; text-align: justify;
        font-family: 'Segoe UI', sans-serif; font-size: 16px;
        line-height: 1.5; border-radius: 15px;
        border: 2px solid #FFD700; z-index: 1000;
        display: none; max-height: 40%; overflow-y: auto;
      }
      b { color: #FFD700; font-size: 18px; }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <div id="text-overlay"></div>
    <button id="change-btn">ΕΠΟΜΕΝΟ ΕΡΓΟ</button>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <a-assets>
        <img id="img1" src="assets/1.png">
        <img id="img2" src="assets/2.png">
        <img id="img3" src="assets/3.png">
        <img id="img4" src="assets/4.png">
      </a-assets>

      <a-marker preset="hiro" id="elytis-marker">
        <a-image id="main-image" src="#img1" position="0 1 0" rotation="0 0 0" width="2.5" height="3.5" material="shader: flat; transparent: true;"></a-image>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const data = [
        { 
          src: "#img1", 
          text: "<b>Ο Άγγελος της Αστυπάλαιας (1966)</b><br>Στο κολάζ αυτό, ο Ελύτης μετουσιώνει τη βυζαντινή παράδοση σε υπερρεαλιστική εικόνα. Ο Άγγελος δεν είναι μόνο θρησκευτικό σύμβολο, αλλά μια οντότητα που προστατεύει το ελληνικό καλοκαίρι και την αθωότητα. Η σύνθεση ισορροπεί ανάμεσα στον ουρανό και τη θάλασσα, θυμίζοντας τον στίχο του: <i>'Πουθενά δεν πάει ο καιρός, αφού είναι ο ίδιος ένας άγγελος'</i>." 
        },
        { 
          src: "#img2", 
          text: "<b>Η Προσφορά</b><br>Εδώ παρατηρούμε την τεχνική της συναρμογής ετερόκλητων στοιχείων που αποκτούν νέα ζωή. Το έργο συμβολίζει την προσφορά του ποιητή προς το φως και το Αιγαίο. Τα αντικείμενα μοιάζουν να αιωρούνται σε ένα μεταφυσικό χώρο, αντανακλώντας την πεποίθηση του Ελύτη ότι η ύλη μπορεί να πνευματικοποιηθεί μέσω της τέχνης και της καθαρότητας των χρωμάτων." 
        },
        { 
          src: "#img3", 
          text: "<b>Το Μήνυμα</b><br>Μια δυναμική σύνθεση όπου το χρώμα κυριαρχεί. Το 'Μήνυμα' αναφέρεται στην ελπίδα και την ορμή της νεότητας. Ο Ελύτης πίστευε στην 'ανοιχτή' σκέψη και στην αναμόρφωση του κόσμου μέσα από το όνειρο. Οι γεωμετρικές φόρμες συνυπάρχουν με οργανικά σχήματα, δημιουργώντας μια οπτική ποίηση που προαναγγέλλει ένα αισιόδοξο μέλλον." 
        },
        { 
          src: "#img4", 
          text: "<b>Ερημιά</b><br>Σε αυτό το έργο, ο ποιητής εξερευνά τη 'γεωμετρία της σιωπής'. Η Ερημιά δεν είναι θλίψη, αλλά ένας χώρος αυτογνωσίας και περισυλλογής. Η μοναξιά του τοπίου συνδέεται με την απεραντοσύνη της θάλασσας, εκεί που οι αισθήσεις οξύνονται. Είναι μια εικαστική απόδοση της 'αφαίρεσης' που χαρακτηρίζει το ύστερο έργο του ποιητή, αναζητώντας την ουσία των πραγμάτων." 
        }
      ];

      let currentIndex = 0;
      const marker = document.getElementById('elytis-marker');
      const btn = document.getElementById('change-btn');
      const textOverlay = document.getElementById('text-overlay');
      const imageEl = document.getElementById('main-image');

      marker.addEventListener('markerFound', () => {
        textOverlay.style.display = 'block';
        btn.style.display = 'block';
        textOverlay.innerHTML = data[currentIndex].text;
      });

      marker.addEventListener('markerLost', () => {
        textOverlay.style.display = 'none';
        btn.style.display = 'none';
      });

      btn.addEventListener('click', () => {
        currentIndex = (currentIndex + 1) % data.length;
        imageEl.setAttribute('src', data[currentIndex].src);
        textOverlay.innerHTML = data[currentIndex].text;
        
        if(currentIndex === 3) { 
            imageEl.setAttribute('width', '3'); imageEl.setAttribute('height', '3');
        } else {
            imageEl.setAttribute('width', '2.5'); imageEl.setAttribute('height', '3.5');
        }
      });
    </script>
  </body>
</html>
