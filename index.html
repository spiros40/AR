<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Οδυσσέας Ελύτης</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;" 
      vr-mode-ui="enabled: false">
      
      <a-assets>
        <img id="img1" src="assets/1.jpg">
        <img id="img2" src="assets/2.jpg">
        <img id="img3" src="assets/3.jpg">
        <img id="img4" src="assets/4.png">
      </a-assets>

      <a-entity position="0 0 -7"> 
        
        <a-image src="#img1" position="0 1.5 0" width="1.5" height="2.2"
                  animation="property: position; to: 0 1.8 0; dur: 2000; dir: alternate; loop: true">
        </a-image>

        <a-image src="#img2" position="3.5 1 0.5" rotation="0 -30 0" width="1.8" height="2"></a-image>

        <a-image src="#img3" position="-3.5 1 0.5" rotation="0 30 0" width="1.8" height="2.5"></a-image>

        <a-image src="#img4" position="0 -1.5 2" rotation="-45 0 0" width="2" height="2"></a-image>

        <a-text value="Το Δωματιο με τις Εικονες\nΟδυσσεας Ελυτης" 
                align="center" color="#FFD700" position="0 3.8 0" width="7">
        </a-text>
      </a-entity>

      <a-entity camera look-controls></a-entity>
      
    </a-scene>
  </body>
</html>
