<!DOCTYPE html>
<html>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <img id="collage-layer" src="https://path-to-your-image/elytis_collage.png">
        <audio id="poem-audio" src="https://path-to-your-audio/oxopetra.mp3" preload="auto"></audio>
      </a-assets>

      <a-marker preset="hiro">
        
        <a-image 
          src="#collage-layer" 
          position="0 0 0" 
          rotation="-90 0 0" 
          width="1.5" height="1.5"
          animation="property: position; to: 0 0.5 0; dur: 2000; easing: easeInOutQuad; loop: true; dir: alternate">
        </a-image>

        <a-entity 
          text="value: Πουθενα δεν παει ο καιρος,\nαφου ειναι ο ιδιος ενας αγγελος; 
                align: center; color: #FFD700; width: 3;" 
          position="0 1.2 0" 
          rotation="-90 0 0">
        </a-entity>

        <a-entity sound="src: #poem-audio; autoplay: false; volume: 1"></a-entity>

      </a-marker>

      <a-entity camera></a-entity>
      
    </a-scene>

    <script>
      // Κώδικας για να ξεκινάει ο ήχος μόλις εντοπιστεί το κολάζ
      var marker = document.querySelector("a-marker");
      var audio = document.querySelector("[sound]");
      
      marker.addEventListener("markerFound", function() {
          audio.components.sound.playSound();
          console.log("Το Δωμάτιο με τις Εικόνες ενεργοποιήθηκε!");
      });

      marker.addEventListener("markerLost", function() {
          audio.components.sound.stopSound();
      });
    </script>
  </body>
</html>
