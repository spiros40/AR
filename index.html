<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Οδυσσέας Ελύτης - AR Gallery</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;" 
      vr-mode-ui="enabled: false">
      
      <a-assets>
        <img id="img1" src="assets/1.jpg">
        <img id="img2" src="assets/2.jpg">
        <img id="img3" src="assets/3.jpg">
        <img id="img4" src="assets/4.png">
      </a-assets>

      <a-entity camera look-controls>
        
        <a-image 
          src="#img1" 
          position="0 0.1 -4" 
          width="1.2" height="1.8"
          animation="property: position; to: 0 0.25 -4; dur: 2000; dir: alternate; loop: true">
        </a-image>

        <a-image 
          src="#img2" 
          position="1.3 0.6 -4" 
          width="0.8" height="1">
        </a-image>

        <a-image 
          src="#img3" 
          position="-1.3 0.6 -4" 
          width="0.8" height="1.1">
        </a-image>

        <a-image 
          src="#img4" 
          position="0 -1 -4" 
          width="1" height="1">
        </a-image>

        <a-text 
          value="Το Δωματιο με τις Εικονες\nΟδυσσεας Ελυτης" 
          align="center" 
          color="#FFD700" 
          position="0 1.4 -4" 
          width="3.5">
        </a-text>

      </a-entity>
      
    </a-scene>

    <script>
      // Επιβεβαίωση φόρτωσης
      window.addEventListener('click', function () {
        var scene = document.querySelector('a-scene');
        if (scene.hasLoaded) {
          console.log("Η AR Gallery του Ελύτη είναι έτοιμη!");
        }
      });
    </script>
  </body>
</html>
