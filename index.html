<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elytis AR Gallery - Fixed</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden; background-color: black;">
    <a-scene 
      embedded 
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;" 
      renderer="logarithmicDepthBuffer: true;"
      vr-mode-ui="enabled: false">
      
      <a-assets>
        <img id="img1" src="assets/1.jpg">
        <img id="img2" src="assets/2.jpg">
        <img id="img3" src="assets/3.jpg">
        <img id="img4" src="assets/4.png">
      </a-assets>

      <a-entity camera look-controls>
        
        <a-entity id="gallery-container" visible="true">
            <a-image src="#img1" position="0 0.1 -4" width="1.2" height="1.8"></a-image>

            <a-image src="#img2" position="1.4 0.6 -4" width="0.8" height="1"></a-image>

            <a-image src="#img3" position="-1.4 0.6 -4" width="0.8" height="1.1"></a-image>

            <a-image src="#img4" position="0 -1 -4" width="1" height="1"></a-image>

            <a-text 
              value="Οδυσσεας Ελυτης\nΤο Δωματιο με τις Εικονες" 
              align="center" color="#FFD700" position="0 1.4 -4" width="3.5">
            </a-text>
        </a-entity>

      </a-entity>
    </a-scene>

    <script>
      // Διόρθωση για το μαύρισμα της οθόνης
      window.addEventListener('load', function () {
        const scene = document.querySelector('a-scene');
        scene.addEventListener('loaded', function () {
            console.log("Η σκηνή είναι έτοιμη!");
            // Μερικές φορές το AR.js χρειάζεται ένα μικρό "σπρώξιμο" για να δείξει την κάμερα
            const video = document.querySelector('video');
            if (video) {
                video.style.width = "100%";
                video.style.height = "100%";
            }
        });
      });
    </script>
  </body>
</html>
