<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Ελύτης - Image Tracking AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
      .arjs-loader {
        height: 100%; width: 100%; position: absolute; 
        top: 0; left: 0; background-color: rgba(0, 0, 0, 0.8);
        z-index: 9999; display: flex; justify-content: center; align-items: center;
      }
      .arjs-loader div { text-align: center; font-size: 1.25em; color: white; }
      
      #comment-box {
        position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
        width: 80%; padding: 15px; background: rgba(255, 215, 0, 0.9);
        color: black; font-family: sans-serif; font-weight: bold;
        border-radius: 10px; display: none; text-align: center; z-index: 1000;
      }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <div class="arjs-loader"><div>Φόρτωση δεδομένων...</div></div>
    <div id="comment-box"></div>

    <a-scene
      vr-mode-ui="enabled: false;"
      renderer="logarithmicDepthBuffer: true;"
      embedded
      arjs="trackingMethod: best; sourceType: webcam;debugUIEnabled: false;">

      <a-nft
        type="nft"
        url="assets/nft/1" 
        id="nft1">
        <a-text value="Ο ΑΓΓΕΛΟΣ ΤΗΣ ΑΣΤΥΠΑΛΑΙΑΣ (1966)" position="0 0 0" rotation="-90 0 0" color="gold"></a-text>
      </a-nft>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Λογική για την εμφάνιση των σχολίων όταν "πιάσει" την εικόνα
      window.addEventListener('nft2D-found', (event) => {
        const commentBox = document.getElementById('comment-box');
        commentBox.style.display = 'block';
        
        if (event.target.id === 'nft1') {
          commentBox.innerText = "Σχόλιο: Ο Ελύτης εδώ χρησιμοποιεί τον άγγελο ως σύμβολο της ελληνικής πνευματικότητας.";
        }
      });

      window.addEventListener('nft2D-lost', () => {
        document.getElementById('comment-box').style.display = 'none';
      });
    </script>
  </body>
</html>
