<!DOCTYPE html>
<html>
  <head>
    <title>Οδυσσέας Ελύτης - Το Δωμάτιο με τις Εικόνες AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <img id="img1" src="assets/1.jpg"> <img id="img2" src="assets/2.jpg"> <img id="img3" src="assets/3.jpg"> <img id="img4" src="assets/4.png"> <audio id="poem-audio" src="assets/poem.mp3" preload="auto"></audio>
      </a-assets>

      <a-marker preset="hiro">
        
        <a-image 
          src="#img1" 
          position="0 0.8 0" 
          rotation="-90 0 0" 
          width="1.2" height="1.8"
          animation="property: position; to: 0 1.1 0; dur: 3000; easing: easeInOutQuad; loop: true; dir: alternate">
        </a-image>

        <a-image 
          src="#img2" 
          position="1.5 0.5 -0.5" 
          rotation="-60 -30 0" 
          width="1" height="1.3">
        </a-image>

        <a-image 
          src="#img3" 
          position="-1.5 0.5 -0.5" 
          rotation="-60 30 0" 
          width="1" height="1.5">
        </a-image>

        <a-image 
          src="#img4" 
          position="0 0.2 1.2" 
          rotation="-90 0 0" 
          width="1.2" height="1.2">
        </a-image>

        <a-entity 
          text="value: Πουθενα δεν παει ο καιρος,\nαφου ειναι ο ιδιος ενας αγγελος; 
                align: center; color: #FFD700; width: 4; font: https://cdn.aframe.io/fonts/Exo2Bold.fnt" 
          position="0 1.8 -0.5" 
          rotation="-45 0 0">
        </a-entity>

        <a-entity sound="src: #poem-audio; autoplay: false; volume: 1"></a-entity>

      </a-marker>

      <a-entity camera></a-entity>
      
    </a-scene>

    <script>
      var marker = document.querySelector("a-marker");
      var audio = document.querySelector("[sound]");
      
      // Έναρξη ήχου με τον εντοπισμό του κολάζ
      marker.addEventListener("markerFound", function() {
          if(audio.components.sound) {
              audio.components.sound.playSound();
          }
          console.log("Το 'Δωμάτιο με τις Εικόνες' του Ελύτη ζωντάνεψε!");
      });

      // Παύση ήχου όταν χάνεται η οπτική επαφή
      marker.addEventListener("markerLost", function() {
          if(audio.components.sound) {
              audio.components.sound.stopSound();
          }
      });
    </script>
  </body>
</html>
